spring:
  application:
    name: etchlog

  # The public API renders all cryptographic fields in snake_case (leaf_index, tree_size,
  # root_hash, ed25519_signature, audit_path, …). byte[] fields serialize as standard Base64,
  # which is Jackson's default — matching the documented request/response contract.
  jackson:
    property-naming-strategy: SNAKE_CASE

  # Render Spring's built-in exceptions (405, 415, unknown route, …) as RFC 9457
  # application/problem+json too, so every error — framework or application (see
  # ApiExceptionHandler) — shares one shape.
  mvc:
    problemdetails:
      enabled: true

  # Default profile: embedded SQLite — the single-binary / demo footprint that boots with no
  # external database. Production self-hosting runs with `--spring.profiles.active=postgres`
  # (see application-postgres.yml), whose MVCC concurrency matters for the public read/proof path.
  datasource:
    url: jdbc:sqlite:${ETCHLOG_DB_PATH:./data/etchlog.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      # SQLite is a single-writer file lock; one pooled connection avoids SQLITE_BUSY contention.
      maximum-pool-size: 1

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema. Hibernate never generates or alters DDL.
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

  # Schema is versioned with Flyway, run on startup. The {vendor} placeholder resolves to the
  # database id derived from the JDBC URL — `sqlite` here, `postgresql` under the postgres profile —
  # so each backend gets its own dialect-correct DDL under db/migration/{vendor}/.
  flyway:
    enabled: true
    locations: classpath:db/migration/{vendor}
    baseline-on-migrate: false
    validate-on-migrate: true

# Appender API keys (etchlog.security.api-keys) are intentionally NOT set here — committing keys is a
# leak risk, and an empty default would only fail the server closed at startup. Configure them at
# deploy time instead; the server hashes each RAW key once and discards the plaintext:
#
#   * Production: set the env var ETCHLOG_SECURITY_API_KEYS to one (or a comma-separated set, for
#     zero-downtime rotation) of high-entropy keys, e.g.
#       export ETCHLOG_SECURITY_API_KEYS="etchlog_ak_...,etchlog_ak_old..."
#   * Local/demo: run with the `demo` profile (application-demo.yml) for the built-in demo key.
#
# With no key configured the append endpoint is unreachable and the server fails fast (fail-closed).

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  info:
    # Belt-and-suspenders: the /actuator/info endpoint is public, so never let it surface raw
    # configuration. env exposure is off by default in Spring Boot 3, but pin it explicitly so a
    # future `management.info.env.enabled=true` can't silently leak etchlog.* config (key file
    # paths, etc.). git/build info remain harmless and stay enabled.
    env:
      enabled: false
  endpoint:
    health:
      probes:
        enabled: true
      # Expose only the top-level UP/DOWN status to anonymous callers; component details
      # (datasource connectivity, disk space, liveness) are disclosed only to authorized
      # principals so the public health probe never leaks internal infrastructure state.
      show-details: when-authorized
    prometheus:
      # The scrape endpoint is read-only telemetry; never allow writes/POSTs against it.
      access: read_only
  # Common tags stamped on every meter so a Prometheus scraping multiple instances into one TSDB
  # can disambiguate series. `instance` defaults to "default" but is overridable per deployment.
  metrics:
    tags:
      application: etchlog
      instance: ${ETCHLOG_INSTANCE_ID:default}
