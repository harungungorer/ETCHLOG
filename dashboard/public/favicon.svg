<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Etchlog">
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Merkle tree: root over two children, with leaf hashes -->
  <g stroke="#38bdf8" stroke-width="1.6" stroke-linecap="round">
    <line x1="16" y1="9" x2="9.5" y2="16"/>
    <line x1="16" y1="9" x2="22.5" y2="16"/>
    <line x1="9.5" y1="16" x2="7" y2="23"/>
    <line x1="9.5" y1="16" x2="12" y2="23"/>
    <line x1="22.5" y1="16" x2="20" y2="23"/>
    <line x1="22.5" y1="16" x2="25" y2="23"/>
  </g>
  <g fill="#e2e8f0">
    <circle cx="16" cy="9" r="2.6"/>
    <circle cx="9.5" cy="16" r="2.2"/>
    <circle cx="22.5" cy="16" r="2.2"/>
  </g>
  <g fill="#38bdf8">
    <circle cx="7" cy="23.5" r="1.8"/>
    <circle cx="12" cy="23.5" r="1.8"/>
    <circle cx="20" cy="23.5" r="1.8"/>
    <circle cx="25" cy="23.5" r="1.8"/>
  </g>
</svg>
